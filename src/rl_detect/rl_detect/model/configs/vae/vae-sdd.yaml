# lightning.pytorch==2.2.0.post0
experiment_name: vae
seed_everything: 42

model:
  class_path: traj_vae.SimpleVaeLitModule
  init_args:
    obs_len: 8
    pred_len: 12
    num_samples: 20

data:
  class_path: model.datasets.dataset.SocialTrajectoryDataModule
  init_args:
    path: model/data/sdd
    homographies_path: model/data/homographies/sdd
    coord_system: image
    frame_delta: 12
    only_visible: true
    fill_missing: false
    min_obs_len: 8
    min_pred_len: 12
    max_step_size: 50
    center_scene: false
    rotate_prob: 0
    flip_prob: 0
    noise_prob: 0
    noise_scale: 0
    batch_size: 32
    num_workers: 4

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 0.0003
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
    weight_decay: 0.0

lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    monitor: val_loss
    mode: min
    factor: 0.5
    patience: 5
    threshold: 0.0001
    threshold_mode: rel
    cooldown: 0
    min_lr: 0.0
    eps: 1.0e-08

trainer:
  accelerator: gpu
  strategy: auto
  devices: [0]
  precision: 32
  logger:
    class_path: lightning.pytorch.loggers.TensorBoardLogger
    init_args:
      save_dir: logs
      default_hp_metric: false
  callbacks:
  - class_path: lightning.pytorch.callbacks.EarlyStopping
    init_args:
      monitor: val_loss
      patience: 10
      verbose: false
      mode: min
  max_epochs: 100
  check_val_every_n_epoch: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
