# lightning.pytorch==2.2.0.post0
experiment_name: model6-k20-eval
seed_everything: 42

model:
  class_path: model.model6.Model6LitModule
  init_args:
    obs_len: 8
    pred_len: 12
    num_samples: 20
    goal_net_pretrain_epochs: 5
    goal_loss_weight: 1
    goal_matching_loss_weight: 1
    goal_matching_loss_mode: all
    encoder_hidden_size: 16
    encoder_num_layers: 2
    encoder_nhead: 2
    encoder_dim_feedforward: 32
    encoder_dropout: 0.3
    encoder_norm_first: true
    encoder_activation: relu
    decoder_hidden_size: 16
    decoder_num_layers: 2
    decoder_nhead: 2
    decoder_dim_feedforward: 32
    decoder_dropout: 0.3
    decoder_norm_first: true
    decoder_activation: relu


data:
  class_path: model.datasets.dataset.TrajectoryDataModule
  init_args:
    path: model/data/thor
    homographies_path: model/data/homographies/thor
    coord_system: image
    frame_delta: 40
    only_visible: true
    fill_missing: false
    min_obs_len: 8
    min_pred_len: 12
    max_step_size: null
    cluster_labels_path: null
    center_scene: false
    rotate_prob: 0
    flip_prob: 0
    noise_prob: 0
    noise_scale: 0
    batch_size: 128
    num_workers: 4

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 0.0003
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
    weight_decay: 0.0

lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    monitor: val_ade
    mode: min
    factor: 0.5
    patience: 5
    threshold: 0.0001
    threshold_mode: rel
    cooldown: 0
    min_lr: 0.0
    eps: 1.0e-08

trainer:
  accelerator: gpu
  strategy: auto
  devices: [0]
  precision: 32
  logger:
    class_path: lightning.pytorch.loggers.TensorBoardLogger
    init_args:
      save_dir: logs
      default_hp_metric: false
  callbacks:
  - class_path: lightning.pytorch.callbacks.EarlyStopping
    init_args:
      monitor: val_ade
      patience: 10
      verbose: false
      mode: min
  max_epochs: 250
  check_val_every_n_epoch: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
